<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>evil-read-arxiv</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <h1>论文推荐工作台</h1>
          <p>本地 vault 数据 · arXiv / 顶会论文 · 中文阅读辅助</p>
        </div>
        <div class="toolbar">
          <span class="data-mode" id="dataMode">加载中...</span>
          <label class="auto-refresh">
            <input id="autoRefreshToggle" type="checkbox" checked />
            <span>自动</span>
          </label>
          <select id="languageSelect" class="mini-select" aria-label="语言">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
          <button class="icon-button" id="refreshBtn" title="刷新数据" aria-label="刷新数据">↻</button>
        </div>
      </header>

      <section class="stats" id="stats"></section>

      <main class="workspace">
        <aside class="paper-list-panel">
          <section class="interest-panel" aria-label="&#20852;&#36259;&#26041;&#21521;&#25628;&#32034;">
            <div class="interest-head">
              <div class="interest-copy">
                <b>&#30740;&#31350;&#20852;&#36259;</b>
                <span>Codex &#21322;&#33258;&#21160;&#31579;&#36873;&#20505;&#36873;&#35770;&#25991;</span>
              </div>
              <div class="interest-main">
                <input id="interestInput" type="search" placeholder="OCT &#30524;&#31185; AI &#29983;&#29289;&#21442;&#25968;&#27979;&#37327; &#35270;&#20809;" />
                <select id="interestMode" aria-label="&#20852;&#36259;&#25628;&#32034;&#27169;&#24335;">
                  <option value="codex">Codex &#31579;&#36873;</option>
                  <option value="semantic">&#35821;&#20041;&#31579;&#36873;</option>
                  <option value="arxiv">&#37325;&#25628; arXiv</option>
                </select>
                <button class="text-button primary-action" id="interestSearchBtn">&#25552;&#20132;</button>
              </div>
            </div>
            <div class="skill-strip">
              <span class="skill-label">&#25216;&#33021;</span>
              <select id="skillSelect" aria-label="&#36873;&#25321;&#25216;&#33021;">
                <option value="start-my-day">&#27599;&#26085;&#25512;&#33616;</option>
                <option value="paper-analyze">&#35770;&#25991;&#20998;&#26512;</option>
                <option value="extract-paper-images">&#25552;&#21462;&#22270;&#29255;</option>
                <option value="paper-search">&#31508;&#35760;&#25628;&#32034;</option>
                <option value="conf-papers">&#39030;&#20250;&#25628;&#32034;</option>
                <option value="codex-queue">Codex &#38431;&#21015;</option>
              </select>
              <button class="text-button" id="runSkillBtn">&#36816;&#34892;</button>
              <span class="skill-hint">&#27599;&#26085;&#25512;&#33616;&#12289;&#31508;&#35760;&#25628;&#32034;&#12289;&#39030;&#20250;&#25628;&#32034;&#21487;&#30452;&#25509;&#36816;&#34892;&#65307;&#20998;&#26512;&#21644;&#25552;&#22270;&#20808;&#36827; Codex &#38431;&#21015;&#12290;</span>
            </div>
          </section>
          <div class="search-row">
            <input id="searchInput" type="search" placeholder="列表内快速过滤：OCT、OCTA、VLM、分割..." />
            <select id="sourceFilter" aria-label="筛选来源">
              <option value="all">全部来源</option>
              <option value="daily-recommendation">今日推荐</option>
              <option value="conf-papers">顶会</option>
              <option value="paper-note">本地笔记</option>
            </select>
            <select id="dateFilter" aria-label="筛选日期">
              <option value="all">全部日期</option>
            </select>
            <select id="assetFilter" aria-label="筛选资料">
              <option value="all">全部资料</option>
              <option value="analysis">有详析</option>
              <option value="images">有图片</option>
              <option value="localPdf">有本地 PDF</option>
              <option value="onlinePdf">有在线 PDF</option>
            </select>
            <select id="statusFilter" aria-label="筛选阅读状态">
              <option value="all">全部状态</option>
              <option value="unread">未读</option>
              <option value="reading">在读</option>
              <option value="done">已读</option>
              <option value="starred">重点</option>
              <option value="hidden">暂不关注</option>
            </select>
            <select id="sortSelect" aria-label="排序">
              <option value="score">评分优先</option>
              <option value="recent">最近生成</option>
              <option value="images">图片优先</option>
              <option value="title">标题 A-Z</option>
            </select>
          </div>

          <div class="quick-row" aria-label="快捷筛选">
            <button type="button" class="quick-chip" data-preset="today">今日</button>
            <button type="button" class="quick-chip" data-preset="ready">有图详析</button>
            <button type="button" class="quick-chip" id="batchSummaryBtn">批量摘要</button>
            <button type="button" class="quick-chip" data-preset="todo">未读</button>
            <button type="button" class="quick-chip" data-preset="starred">重点</button>
            <button type="button" class="quick-chip" data-preset="favorites">收藏</button>
            <button type="button" class="quick-chip" data-preset="reset">重置</button>
          </div>

          <div class="list-meta-row">
            <span id="resultCount">0 篇论文</span>
            <div class="segmented" aria-label="列表密度">
              <button type="button" class="segmented-button active" data-view="comfortable">舒适</button>
              <button type="button" class="segmented-button" data-view="compact">紧凑</button>
            </div>
          </div>
          <div class="paper-list" id="paperList"></div>
        </aside>

        <section class="detail-panel" id="detailPanel">
          <div class="empty-state">
            <h2>选择一篇论文</h2>
            <p>左侧列表会展示最近生成的顶会推荐和本地论文笔记。</p>
          </div>
        </section>
      </main>
    </div>

    <div class="image-modal" id="imageModal" hidden>
      <button class="modal-backdrop" id="closeImageModal" aria-label="关闭图片预览"></button>
      <figure class="modal-card">
        <img id="modalImage" alt="" />
        <figcaption id="modalCaption"></figcaption>
      </figure>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
