<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>evil-read-arxiv</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <h1>论文推荐工作台</h1>
          <p>本地 vault 数据 · arXiv / 顶会论文 · 中文阅读辅助</p>
        </div>
        <div class="toolbar">
          <button class="icon-button" id="refreshBtn" title="刷新数据" aria-label="刷新数据">↻</button>
          <button class="text-button" id="runConfBtn">运行 CVPR 2025 OCT AI</button>
        </div>
      </header>

      <section class="stats" id="stats"></section>

      <main class="workspace">
        <aside class="paper-list-panel">
          <div class="search-row">
            <input id="searchInput" type="search" placeholder="搜索 OCT、OCTA、VLM、分割..." />
            <select id="sourceFilter" aria-label="筛选来源">
              <option value="all">全部</option>
              <option value="conf-papers">顶会</option>
              <option value="paper-note">本地笔记</option>
            </select>
            <select id="statusFilter" aria-label="筛选阅读状态">
              <option value="all">全部状态</option>
              <option value="unread">未读</option>
              <option value="reading">在读</option>
              <option value="done">已读</option>
              <option value="starred">重点</option>
              <option value="hidden">暂不关注</option>
            </select>
            <select id="sortSelect" aria-label="排序">
              <option value="score">评分优先</option>
              <option value="recent">最近生成</option>
              <option value="images">图片优先</option>
              <option value="title">标题 A-Z</option>
            </select>
          </div>
          <div class="list-meta-row">
            <span id="resultCount">0 篇论文</span>
            <div class="segmented" aria-label="列表密度">
              <button type="button" class="segmented-button active" data-view="comfortable">舒适</button>
              <button type="button" class="segmented-button" data-view="compact">紧凑</button>
            </div>
          </div>
          <div class="paper-list" id="paperList"></div>
        </aside>

        <section class="detail-panel" id="detailPanel">
          <div class="empty-state">
            <h2>选择一篇论文</h2>
            <p>左侧列表会展示最近生成的顶会推荐和本地论文笔记。</p>
          </div>
        </section>
      </main>
    </div>

    <div class="image-modal" id="imageModal" hidden>
      <button class="modal-backdrop" id="closeImageModal" aria-label="关闭图片预览"></button>
      <figure class="modal-card">
        <img id="modalImage" alt="" />
        <figcaption id="modalCaption"></figcaption>
      </figure>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
